<!DOCTYPE html>
<html lang="en">
<head>

    body {

      background: linear-gradient(to right, #00c6ff, #0072ff);
      text-align: center;
      padding-top: 60px;
      color: #fff;
    }
    h1 {
      font-size: 2.5em;

      text-shadow: 2px 2px 4px #000;

    p {

      font-size: 1em;

      padding: 15px;
